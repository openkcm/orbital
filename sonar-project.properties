# Test file configuration - tells SonarCloud which files are tests
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Source exclusions (generated code, examples)
sonar.exclusions=**/proto/**/*.pb.go,**/proto/**/*.pb.validate.go,**/examples/**/main.go,**/performance/**/main.go

# Coverage exclusions (generated code, examples, test files)
sonar.coverage.exclusions=**/proto/**/*.pb.go,**/proto/**/*.pb.validate.go,**/examples/**,**/performance/**,**/*_test.go

# Duplication exclusions (generated code, proto, test files)
sonar.cpd.exclusions=**/proto/**,**/*_test.go,**/examples/**,**/performance/**
